<!DOCTYPE html>
<html>
<head>
  <title>Mapa miejsc dostaw</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map { height: 1000px; width: 100%; }
    .legend { background: white; padding: 8px 10px; border-radius: 6px; line-height: 1.4; }
    .legend i { display:inline-block; width:12px; height:12px; margin-right:6px; vertical-align:middle; }
  </style>
</head>
<body>
  <h2>Mapa miejsc dostaw</h2>
  <div id="map"></div>

  <script>
  var map = L.map('map').setView([50.97652403375819, 17.23884572224588], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Definicje ikon dla częstotliwości
  var icons = {
    frequent: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    }),
    regular: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    }),
    occasional: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    }),
    rare: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-violet.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    })
  };

  // Dane z Django
  var places = [
    {% for place in places %}
      {
        name: "{{ place.customer.name|escapejs }} - {{ place.name|escapejs }}",
        lat: {{ place.latitude|default:"null" }},
        lng: {{ place.longitude|default:"null" }},
        freq: "{{ place.delivery_frequency }}"
      },
    {% endfor %}
  ].filter(p => p.lat !== null && p.lng !== null);

  // Dodanie markerów
  places.forEach(function(p) {
    var marker = L.marker([p.lat, p.lng], { icon: icons[p.freq] || icons.rare })
      .addTo(map)
      .bindPopup(p.name + "<br/><small>częstotliwość: " + p.freq + "</small>");
  });
</script>

</body>
</html>
